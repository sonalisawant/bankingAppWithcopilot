apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/banking/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: ACCOUNT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: ACCOUNT_SERVICE_URL
            - name: TRANSACTION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: TRANSACTION_SERVICE_URL
            - name: AUDIT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: AUDIT_SERVICE_URL
