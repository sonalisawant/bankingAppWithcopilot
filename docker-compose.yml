version: '3.9'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - banknet

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - banknet

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - banknet

  account-service:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      - ~/.m2:/root/.m2
    ports:
      - '8081:8081'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banking
      SPRING_DATASOURCE_USERNAME: banking
      SPRING_DATASOURCE_PASSWORD: banking
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: mvn -f account-service/pom.xml -Dspring-boot.run.mainClass=com.example.accountservice.AccountServiceApplication spring-boot:run
    depends_on:
      - postgres
      - kafka
    networks:
      - banknet

  transaction-service:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      - ~/.m2:/root/.m2
    ports:
      - '8082:8082'
    depends_on:
      - kafka
      - account-service
      - postgres
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BANKING_ACCOUNTS_SERVICE_URL: http://account-service:8081
      ACCOUNTS_SERVICE_URL: http://account-service:8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banking
      SPRING_DATASOURCE_USERNAME: banking
      SPRING_DATASOURCE_PASSWORD: banking
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
    command: mvn -f transaction-service/pom.xml -Dspring-boot.run.mainClass=com.example.transactionservice.TransactionServiceApplication spring-boot:run
    networks:
      - banknet

  audit-service:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      - ~/.m2:/root/.m2
    ports:
      - '8084:8084'
    depends_on:
      - kafka
      - postgres
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banking
      SPRING_DATASOURCE_USERNAME: banking
      SPRING_DATASOURCE_PASSWORD: banking
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
    command: mvn -f audit-service/pom.xml -Dspring-boot.run.mainClass=com.example.auditservice.AuditServiceApplication spring-boot:run
    networks:
      - banknet

  api-gateway:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      - ~/.m2:/root/.m2
    ports:
      - '8888:8080'
    environment:
      ACCOUNT_SERVICE_URL: http://account-service:8081
      TRANSACTION_SERVICE_URL: http://transaction-service:8082
      AUDIT_SERVICE_URL: http://audit-service:8084
    depends_on:
      - account-service
      - transaction-service
      - audit-service
    command: mvn -f api-gateway/pom.xml -Dspring-boot.run.mainClass=com.example.apigateway.ApiGatewayApplication spring-boot:run
    networks:
      - banknet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - api-gateway
    networks:
      - banknet

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - account-service
      - transaction-service
      - audit-service
      - api-gateway
    networks:
      - banknet

  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - banknet

networks:
  banknet:
    driver: bridge

volumes:
  postgres-data:
  grafana-data:
