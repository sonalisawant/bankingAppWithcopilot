version: '3.9'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - banknet

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - banknet

  mongodb:
    image: mongo:6.0
    ports:
      - '27017:27017'
    networks:
      - banknet

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - banknet

  cassandra:
    image: cassandra:4.1
    environment:
      CASSANDRA_CLUSTER_NAME: banking-cluster
      CASSANDRA_NUM_TOKENS: 1
      CASSANDRA_START_RPC: 'true'
    ports:
      - '9042:9042'
    networks:
      - banknet

  account-service:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
    ports:
      - '8081:8081'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banking
      SPRING_DATASOURCE_USERNAME: banking
      SPRING_DATASOURCE_PASSWORD: banking
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: mvn -q -f account-service/pom.xml -Dspring-boot.run.mainClass=com.example.accountservice.AccountServiceApplication spring-boot:run
    depends_on:
      - postgres
      - kafka
    networks:
      - banknet

  transaction-service:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
    ports:
      - '8082:8082'
    depends_on:
      - kafka
      - account-service
      - postgres
      - cassandra
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BANKING_ACCOUNTS_SERVICE_URL: http://account-service:8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banking
      SPRING_DATASOURCE_USERNAME: banking
      SPRING_DATASOURCE_PASSWORD: banking
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATA_CASSANDRA_CONTACT_POINTS: cassandra
      SPRING_DATA_CASSANDRA_PORT: 9042
      SPRING_DATA_CASSANDRA_KEYSPACE: banking
    command: mvn -q -f transaction-service/pom.xml -Dspring-boot.run.mainClass=com.example.transactionservice.TransactionServiceApplication spring-boot:run
    networks:
      - banknet

  notification-service:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
    ports:
      - '8083:8083'
    depends_on:
      - kafka
      - mongodb
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/banking
    command: mvn -q -f notification-service/pom.xml -Dspring-boot.run.mainClass=com.example.notificationservice.NotificationServiceApplication spring-boot:run
    networks:
      - banknet

  audit-service:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
    ports:
      - '8084:8084'
    depends_on:
      - kafka
      - postgres
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banking
      SPRING_DATASOURCE_USERNAME: banking
      SPRING_DATASOURCE_PASSWORD: banking
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
    command: mvn -q -f audit-service/pom.xml -Dspring-boot.run.mainClass=com.example.auditservice.AuditServiceApplication spring-boot:run
    networks:
      - banknet

  ledger-service:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
    ports:
      - '8085:8085'
    depends_on:
      - kafka
      - postgres
      - cassandra
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banking
      SPRING_DATASOURCE_USERNAME: banking
      SPRING_DATASOURCE_PASSWORD: banking
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATA_CASSANDRA_CONTACT_POINTS: cassandra
      SPRING_DATA_CASSANDRA_PORT: 9042
      SPRING_DATA_CASSANDRA_KEYSPACE: banking
    command: mvn -q -f ledger-service/pom.xml -Dspring-boot.run.mainClass=com.example.ledgerservice.LedgerServiceApplication spring-boot:run
    networks:
      - banknet

  api-gateway:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
    ports:
      - '8080:8080'
    depends_on:
      - account-service
      - transaction-service
      - notification-service
      - audit-service
      - ledger-service
    command: mvn -q -f api-gateway/pom.xml -Dspring-boot.run.mainClass=com.example.apigateway.ApiGatewayApplication spring-boot:run
    networks:
      - banknet

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - '8086:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - banknet

  mongo-express:
    image: mongo-express
    ports:
      - '8087:8081'
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongodb
    networks:
      - banknet

networks:
  banknet:
    driver: bridge

volumes:
  postgres-data:
  pgadmin-data:
